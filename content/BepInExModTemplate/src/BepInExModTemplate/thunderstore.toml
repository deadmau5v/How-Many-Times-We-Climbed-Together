[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "d5v"
name = "HowManyTimesWeClimbedTogether"
description = "Tracks how many times you've climbed together with each player."
websiteUrl = "https://github.com/deadmau5v/How-Many-Times-We-Climbed-Together"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_PEAK = "5.4.75301"
PEAKModding-PEAKLib_Core = "1.7.2"
PEAKModding-PEAKLib_UI = "1.6.1"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/BepInExModTemplate/release/com.github.d5v.HowManyTimesWeClimbedTogether.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = [ "peak", ]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/peak/category/
peak = [ "mods", ]
